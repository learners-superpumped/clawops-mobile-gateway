name: Build and release

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - run: go test ./...
      - run: go vet ./...
      - name: Check browser JavaScript
        working-directory: .
        run: node --check agent/web/app.js

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    # 아키텍처별 네이티브 러너 — arm64 를 QEMU 로 에뮬레이트하면 asterisk 소스빌드가
    # ~50분(vs 네이티브 ~7분)까지 늘어 릴리스가 사실상 막힌다. arm64 러너는 public
    # 레포에서 무료(GA 2025-08). ⚠️ 레포가 private 이 되면 이 라벨은 실패한다.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      # QEMU 불필요 — 각 러너가 타깃 아키텍처 네이티브다.
      - uses: docker/setup-buildx-action@v3
      - name: Resolve package version
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build ${{ matrix.arch }} package
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          target: artifact
          platforms: linux/${{ matrix.arch }}
          build-args: PKG_VERSION=${{ env.PKG_VERSION }}
          outputs: type=local,dest=dist
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.arch }}
          path: dist/*.deb
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release
          merge-multiple: true
      - name: Create checksums
        working-directory: release
        run: sha256sum *.deb > SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.deb release/SHA256SUMS --verify-tag --generate-notes
